<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault Breaker - Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      text-align: center;
      color: #cdd8e6;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background-color: #0d1421;
      background-image:
        repeating-linear-gradient(0deg, #111c2e, #111c2e 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, #111c2e, #111c2e 1px, transparent 1px, transparent 40px);
    }
    #wrap { width: 484px; margin: 34px auto 12px; text-align: left; }
    #hud {
      box-sizing: border-box;
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      margin-bottom: 10px;
      background-color: #0f1826;
      border: 2px solid #33506e;
      border-radius: 6px;
    }
    #menuBtn {
      background: transparent;
      border: none;
      color: #cdd8e6;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
      padding: 0;
    }
    #menuBtn:hover { color: #ffffff; }
    #hudRight { display: flex; align-items: center; gap: 12px; }
    #lvl { font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 2px; color: #ffffff; font-size: 15px; }
    #score { font-family: 'Orbitron', sans-serif; font-weight: 700; color: #f5c542; font-size: 15px; }
    #gameBox {
      box-sizing: border-box;
      width: 100%;
      overflow: hidden;
      background-color: #0f1826;
      border: 2px solid #33506e;
      border-radius: 6px;
      background-image:
        repeating-linear-gradient(0deg, #182740, #182740 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, #182740, #182740 1px, transparent 1px, transparent 40px);
    }
    canvas { display: block; touch-action: none; }
    #controls { color: #6f7f96; font-size: 13px; margin: 0 auto 30px; }
  </style>
</head>
<body>

  <div id="wrap">
    <div id="hud">
      <button id="menuBtn" onclick="location.href='index.html'">&larr; Menu</button>
      <div id="hudRight">
        <span id="lvl">LVL 3</span>
        <span id="score">0</span>
      </div>
    </div>
    <div id="gameBox">
      <canvas id="gameCanvas" width="480" height="600"></canvas>
    </div>
  </div>

  <p id="controls"> &nbsp;&bull;&nbsp;</p>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const paddle = { width: 90, height: 14, x: canvas.width / 2 - 45, y: canvas.height - 34, speed: 7 };

    const ball = { x: 0, y: 0, radius: 9, dx: 0, dy: 0 };
    const BALL_SPEED = 5.6;

    const vault = { w: 92, h: 92, x: canvas.width - 100, y: 10, img: new Image(), loaded: false };
    vault.img.onload = () => { vault.loaded = true; };
    vault.img.src = 'vault.png';

    const blockW = 44;
    const blockH = 44;
    const blockGap = 4;
    const BLOCK_HITS = 2;
    const BLOCK_COLOR = '#35506e';
    const RIVET = '#243c57';
    const TIERS = {
      1: { color: '#6f8cae', border: '#465f83', rivet: '#3c5578' },
      2: { color: '#45638a', border: '#2c405c', rivet: '#22354f' },
      3: { color: '#33486a', border: '#c8992e', rivet: '#d9a91a' }
    };
    let blocks = [];

    function buildBlocks() {
      blocks = [];
      const pitch = blockW + blockGap;
      const A = vault.x - 3 * pitch;
      const B = vault.x - 2 * pitch;
      const C = vault.x - pitch;
      const D = vault.x;
      const E = vault.x + pitch;
      const r0 = vault.y;
      const r1 = vault.y + pitch;
      const r2 = vault.y + 2 * pitch;
      const r3 = vault.y + 3 * pitch;
      const r4 = vault.y + 4 * pitch;
      const spec = [
        [C, r0, 3], [C, r1, 3], [D, r2, 3], [E, r2, 3],
        [B, r0, 2], [B, r1, 2], [B, r2, 2], [C, r2, 2], [D, r3, 2], [E, r3, 2],
        [A, r0, 1], [A, r1, 1], [B, r3, 1], [C, r3, 1],
        [D, r4, 1], [E, r4, 1]
      ];
      for (const s of spec) {
        blocks.push({ x: s[0], y: s[1], w: blockW, h: blockH, alive: true, hits: s[2], maxHits: s[2] });
      }
    }

    let gameOver = false;
    let won = false;
    let launched = false;
    let score = 0;
    let leftPressed = false;
    let rightPressed = false;

    function updateScore() { document.getElementById('score').textContent = score; }

    function resetGame() {
      paddle.x = canvas.width / 2 - paddle.width / 2;
      ball.dx = 0; ball.dy = 0;
      buildBlocks();
      score = 0; updateScore();
      gameOver = false; won = false; launched = false;
    }

    function launch() {
      if (launched) return;
      const angle = (Math.random() * 0.4) - 0.2;
      ball.dx = BALL_SPEED * Math.sin(angle);
      ball.dy = -BALL_SPEED * Math.cos(angle);
      launched = true;
    }

    function ballHitsRect(b, r) {
      const cx = Math.max(r.x, Math.min(b.x, r.x + r.w));
      const cy = Math.max(r.y, Math.min(b.y, r.y + r.h));
      const dx = b.x - cx, dy = b.y - cy;
      return (dx * dx + dy * dy) <= b.radius * b.radius;
    }

    function bounceOffRect(r) {
      const overlapLeft = (ball.x + ball.radius) - r.x;
      const overlapRight = (r.x + r.w) - (ball.x - ball.radius);
      const overlapTop = (ball.y + ball.radius) - r.y;
      const overlapBottom = (r.y + r.h) - (ball.y - ball.radius);
      const m = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
      if (m === overlapLeft || m === overlapRight) ball.dx = -ball.dx;
      else ball.dy = -ball.dy;
    }

    function update() {
      if (leftPressed) paddle.x -= paddle.speed;
      if (rightPressed) paddle.x += paddle.speed;
      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

      if (!launched) {
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - ball.radius - 2;
        return;
      }

      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.dx = -ball.dx; }
      if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.dx = -ball.dx; }
      if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.dy = -ball.dy; }

      if (ball.dy > 0 &&
          ball.y + ball.radius >= paddle.y &&
          ball.y + ball.radius <= paddle.y + paddle.height + Math.abs(ball.dy) &&
          ball.x >= paddle.x && ball.x <= paddle.x + paddle.width) {
        let hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
        hitPos = Math.max(-1, Math.min(1, hitPos));
        const speed = Math.hypot(ball.dx, ball.dy);
        const angle = hitPos * (Math.PI / 3);
        ball.dx = speed * Math.sin(angle);
        ball.dy = -Math.abs(speed * Math.cos(angle));
        ball.y = paddle.y - ball.radius;
      }

      for (const bl of blocks) {
        if (bl.alive && ballHitsRect(ball, bl)) {
          bl.hits--;
          if (bl.hits <= 0) { bl.alive = false; score++; updateScore(); }
          bounceOffRect(bl);
          break;
        }
      }

      if (ballHitsRect(ball, vault)) won = true;

      if (ball.y - ball.radius > canvas.height) gameOver = true;
    }

    function drawVault() {
      const x = vault.x, y = vault.y, w = vault.w, h = vault.h;
      if (vault.loaded) { ctx.drawImage(vault.img, x, y, w, h); return; }
      ctx.fillStyle = '#f5c542';
      ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill();
      ctx.lineWidth = 4; ctx.strokeStyle = '#d9a91a';
      ctx.beginPath(); ctx.roundRect(x + 3, y + 3, w - 6, h - 6, 6); ctx.stroke();
      const cx = x + w / 2, cy = y + h / 2, r = w * 0.22;
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - r * 0.8); ctx.stroke();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI * 2); ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const bl of blocks) {
        if (!bl.alive) continue;
        const t = TIERS[bl.maxHits] || TIERS[2];
        ctx.fillStyle = t.color;
        ctx.beginPath(); ctx.roundRect(bl.x, bl.y, bl.w, bl.h, 6); ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = t.border;
        ctx.beginPath(); ctx.roundRect(bl.x, bl.y, bl.w, bl.h, 6); ctx.stroke();
        ctx.fillStyle = t.rivet;
        const p = 8;
        for (const rv of [[p, p], [bl.w - p, p], [p, bl.h - p], [bl.w - p, bl.h - p]]) {
          ctx.beginPath(); ctx.arc(bl.x + rv[0], bl.y + rv[1], 2, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = '#eef4fb';
        ctx.font = 'bold 18px "Orbitron", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(bl.hits, bl.x + bl.w / 2, bl.y + bl.h / 2 + 6);
      }

      drawVault();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#eef1f5';
      ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, paddle.height / 2); ctx.fill();
      const cw = paddle.width * 0.26;
      ctx.fillStyle = '#f5c542';
      ctx.beginPath(); ctx.roundRect(paddle.x + paddle.width / 2 - cw / 2, paddle.y, cw, paddle.height, 3); ctx.fill();

      if (!launched) {
        ctx.fillStyle = '#8a9bb2';
        ctx.font = '20px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Space / click / tap to launch', canvas.width / 2, canvas.height / 2);
      }
    }

    function drawOverlay(title, titleColor, subtitle) {
      ctx.fillStyle = 'rgba(13, 20, 33, 0.82)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = titleColor;
      ctx.font = 'bold 36px "Orbitron", sans-serif';
      ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 10);
      ctx.fillStyle = '#cdd8e6';
      ctx.font = '16px system-ui, sans-serif';
      ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 26);
    }

    function loop() {
      if (won) {
        drawOverlay('VAULT CRACKED!', '#f5c542', 'Click or press Space to play again');
      } else if (gameOver) {
        drawOverlay('GAME OVER', '#ff5a5a', 'Click or press Space to retry');
      } else {
        update();
        draw();
      }
      requestAnimationFrame(loop);
    }

    function primaryAction() {
      if (gameOver || won) resetGame();
      else if (!launched) launch();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
      if (e.key === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
      if (e.key === ' ' || e.key === 'Enter') { primaryAction(); e.preventDefault(); }
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft') leftPressed = false;
      if (e.key === 'ArrowRight') rightPressed = false;
    });
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = (e.clientX - rect.left) - paddle.width / 2;
      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
    });
    canvas.addEventListener('click', primaryAction);
    canvas.addEventListener('touchmove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const t = e.touches[0];
      paddle.x = (t.clientX - rect.left) - paddle.width / 2;
      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchstart', (e) => { primaryAction(); e.preventDefault(); }, { passive: false });

    resetGame();
    loop();
  </script>

</body>
</html>
