<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault Breaker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      color: #cdd8e6;
      background-color: #0d1421;
      background-image:
        repeating-linear-gradient(0deg, #111c2e, #111c2e 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, #111c2e, #111c2e 1px, transparent 1px, transparent 40px);
    }
    .emblem { margin-bottom: 16px; }
    h1 {
      margin: 0;
      font-size: 44px;
      letter-spacing: 2px;
      color: #ffffff;
    }
    h1 .gold { color: #f5c542; }
    .tagline {
      margin: 12px 0 30px;
      font-size: 12px;
      letter-spacing: 2px;
      color: #7d8ba1;
    }
    .levels { display: flex; flex-direction: column; gap: 12px; }
    .lvl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      width: 240px;
      padding: 13px 20px;
      background: transparent;
      border: 1px solid #33506e;
      border-radius: 4px;
      color: #eaf1f8;
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .lvl:hover { border-color: #f5c542; color: #ffffff; }
    .pips { display: flex; gap: 5px; }
    .pips i { width: 7px; height: 7px; border-radius: 50%; background: #33506e; }
    .pips i.on { background: #f5c542; }
    .sign {
      margin-top: 34px;
      font-size: 11px;
      letter-spacing: 1px;
      color: #4d5a70;
    }
  </style>
</head>
<body>

  <div class="emblem">
    <svg width="54" height="54" viewBox="0 0 84 84" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="4" width="76" height="76" rx="10" fill="#f5c542" stroke="#d9a91a" stroke-width="4"/>
      <circle cx="42" cy="42" r="18" fill="none" stroke="#1a1a1a" stroke-width="3"/>
      <line x1="42" y1="42" x2="42" y2="27" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <circle cx="42" cy="42" r="2.6" fill="#1a1a1a"/>
    </svg>
  </div>

  <h1>Vault <span class="gold">Breaker</span></h1>

  <div class="levels">
    <button class="lvl" onclick="location.href='level1.html?level=1'">
      <span>Level 1</span>
      <span class="pips"><i class="on"></i><i></i><i></i></span>
    </button>
    <button class="lvl" onclick="location.href='level2.html?level=2'">
      <span>Level 2</span>
      <span class="pips"><i class="on"></i><i class="on"></i><i></i></span>
    </button>
    <button class="lvl" onclick="location.href='level3.html?level=3'">
      <span>Level 3</span>
      <span class="pips"><i class="on"></i><i class="on"></i><i class="on"></i></span>
    </button>
  </div>

</body>
</html>
