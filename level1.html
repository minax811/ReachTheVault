<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault Breaker - Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      background-color: #f5f5f5;
      background-image:
        repeating-linear-gradient(0deg, #dcdcdc, #dcdcdc 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, #dcdcdc, #dcdcdc 1px, transparent 1px, transparent 40px);
    }
    h1 { font-size: 48px; margin-top: 40px; margin-bottom: 5px; }
    #level { font-size: 20px; }
    #gameBox {
      display: inline-block;
      margin: 20px auto;
      border: 3px solid #333;
      background-color: #ffffff;
      background-image:
        repeating-linear-gradient(0deg, #e6e6e6, #e6e6e6 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, #e6e6e6, #e6e6e6 1px, transparent 1px, transparent 40px);
    }
    canvas { display: block; }
    #backBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 18px;
      padding: 10px 20px;
      font-family: 'Orbitron', sans-serif;
    }
  </style>
</head>
<body>

  <h1>Vault Breaker</h1>
  <p>Level <span id="level">1</span></p>

  <div id="gameBox">
    <canvas id="gameCanvas" width="480" height="600"></canvas>
  </div>

  <button id="backBtn" onclick="location.href='index.html'">Back to Menu</button>

</body>
</html>
